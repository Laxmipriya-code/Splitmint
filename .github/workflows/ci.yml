name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: splitmint
          POSTGRES_USER: splitmint
          POSTGRES_PASSWORD: splitmint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U splitmint -d splitmint"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPLITMINT_DATABASE_URL: postgresql+psycopg://splitmint:splitmint@127.0.0.1:5432/splitmint
      SPLITMINT_TEST_DATABASE_URL: postgresql+psycopg://splitmint:splitmint@127.0.0.1:5432/splitmint
      SPLITMINT_FRONTEND_ORIGIN: http://127.0.0.1:5173
      SPLITMINT_JWT_SECRET_KEY: ci-test-secret-key-with-at-least-32-bytes
      SPLITMINT_AI_ENABLED: "false"
      SPLITMINT_OPENAI_API_KEY: ${{ secrets.SPLITMINT_OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e .[dev]
        working-directory: backend
      - name: Lint backend
        run: python -m ruff check alembic app tests
        working-directory: backend
      - name: Test backend
        run: python -m pytest -q
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm ci
        working-directory: frontend
      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: splitmint
          POSTGRES_USER: splitmint
          POSTGRES_PASSWORD: splitmint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U splitmint -d splitmint"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPLITMINT_DATABASE_URL: postgresql+psycopg://splitmint:splitmint@127.0.0.1:5432/splitmint
      SPLITMINT_FRONTEND_ORIGIN: http://127.0.0.1:5173
      SPLITMINT_JWT_SECRET_KEY: ci-test-secret-key-with-at-least-32-bytes
      SPLITMINT_AI_ENABLED: "false"
      VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        run: python -m pip install -e .[dev]
        working-directory: backend
      - name: Migrate backend schema
        run: python -m alembic upgrade head
        working-directory: backend
      - name: Install frontend
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Start backend server
        run: nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
        working-directory: backend
      - name: Wait for backend server
        run: |
          for i in {1..40}; do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 1
          done
      - name: Run Playwright smoke tests
        run: npm run test:e2e
        working-directory: frontend
